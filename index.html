<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oedipa Agency is now Webature</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --text: #f0ede8;
  --text-muted: rgba(240,237,232,0.55);
  --text-faint: rgba(240,237,232,0.28);
  --border: rgba(240,237,232,0.1);
  --border-mid: rgba(240,237,232,0.18);
}

[data-theme="light"] {
  --bg: #f5f3ef;
  --text: #111;
  --text-muted: rgba(17,17,17,0.55);
  --text-faint: rgba(17,17,17,0.28);
  --border: rgba(17,17,17,0.1);
  --border-mid: rgba(17,17,17,0.18);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 64px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}



/* MAIN */
main {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 64px 40px 0;
}

.card {
  max-width: 560px;
  width: 100%;
  text-align: left;
}

.card-label {
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 28px;
  animation: fadeUp 0.7s 0.1s both;
}

.card-heading {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 300;
  line-height: 1.1;
  letter-spacing: -0.025em;
  color: var(--text);
  margin-bottom: 12px;
  animation: fadeUp 0.7s 0.2s both;
}

.card-heading strong {
  font-weight: 500;
}

.divider {
  width: 32px;
  height: 1px;
  background: var(--border-mid);
  margin: 28px 0;
  animation: fadeUp 0.7s 0.3s both;
}

.card-body {
  font-size: 0.93rem;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 40px;
  animation: fadeUp 0.7s 0.35s both;
}

.card-body strong {
  color: var(--text);
  font-weight: 500;
}

.btn-row {
  display: flex;
  align-items: center;
  gap: 24px;
  animation: fadeUp 0.7s 0.45s both;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--text);
  border: none;
  border-radius: 100px;
  padding: 14px 26px;
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.btn-primary:hover { opacity: 0.82; }

.btn-ghost {
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-faint);
  text-decoration: none;
  border-bottom: 1px solid var(--border);
  padding-bottom: 3px;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.btn-ghost:hover { color: var(--text-muted); border-color: var(--border-mid); }

/* FOOTER LINE */
.page-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border);
}

.footer-note {
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--text-faint);
}

.footer-link {
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  text-decoration: none;
  transition: color 0.2s;
}
.footer-link:hover { color: var(--text-muted); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  nav { padding: 0 20px; }
  main { padding: 64px 24px 80px; }
  .page-footer { padding: 16px 20px; }
  .card-heading { font-size: 2rem; }
}
</style>
</head>
<body>

<nav>
  <a href="#"><img src="logo.png" alt="Oedipa Agency" style="height:22px;display:block;opacity:0.75;"></a>
</nav>

<main>
  <div class="card">
    <div class="card-label">A note from us</div>
    <h1 class="card-heading">
      We've got<br>a <strong>new name.</strong>
    </h1>
    <div class="divider"></div>
    <p class="card-body">
      Oedipa Agency has rebranded to <strong>Webature</strong> — same team, same work, sharper focus.<br><br>
      Our website has moved. Everything you need is now at <strong>webature.co.uk</strong>.
    </p>
    <div class="btn-row">
      <a href="https://webature.co.uk" class="btn-primary">
        Go to Webature →
      </a>
      <a href="https://webature.co.uk" class="btn-ghost">webature.co.uk</a>
    </div>
  </div>
</main>

<footer class="page-footer">
  <span class="footer-note">© 2026 Webature</span>
  <a href="mailto:contact@webature.co.uk" class="footer-link">contact@webature.co.uk</a>
</footer>

</body>
</html>
